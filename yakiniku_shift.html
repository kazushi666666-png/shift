<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans JP',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh;}

:root{

.header{background:#fff;border-bottom:1px solid var(--bd);padding:12px 16px;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.06);}

.main{max-width:860px;margin:0 auto;padding:16px 12px 100px;}
.card{background:#fff;border:1px solid var(--bd);border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.card-title{font-size:13px;font-weight:700;color:var(--tx2);margin-bottom:16px;display:flex;align-items:center;gap:8px;}

.big-textarea{background:#f8fafc;border:1px solid var(--bd);border-radius:10px;padding:14px;color:var(--tx);font-size:16px;outline:none;width:100%;resize:vertical;min-height:80px;line-height:1.7;}

.shift-week-title{padding:16px 18px;font-size:15px;font-weight:700;border-bottom:2px solid;}

.sfc{display:flex;align-items:flex-start;border-radius:12px;padding:14px 16px;margin-bottom:10px;gap:12px;border:2px solid;}
.sfc-left{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0;}
.sfc-time{font-size:20px;font-weight:900;}
.sfc-name{font-size:18px;font-weight:700;}

.wish-opt-btn{padding:14px 10px;border-radius:12px;border:2px solid var(--bd);background:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;min-height:54px;text-align:center;line-height:1.4;}
.wish-extra-block{margin-top:12px;background:#f8fafc;border-radius:10px;padding:14px;border:1px solid var(--bd);}

.staff-item{background:#f8fafc;border:1px solid var(--bd);border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:10px;}

.staff-info{flex:1;min-width:0;}

.role-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}

.ov-week-label{font-size:15px;font-weight:700;padding:14px 16px;border-bottom:2px solid;margin-bottom:0;}
.ov-table{width:100%;border-collapse:collapse;table-layout:fixed;}

.ov-day-cell{padding:8px 6px;background:#f8fafc;text-align:center;}
.ov-day-name{font-size:15px;font-weight:700;}
.ov-day-date{font-size:11px;color:var(--tx2);}
.ov-store-cell{padding:6px 8px;vertical-align:top;}
.ov-entry{font-size:12px;padding:4px 0;border-bottom:1px solid #f1f5f9;}
.ov-entry:last-child{border-bottom:none;}
.ov-entry-row{display:flex;align-items:center;gap:5px;flex-wrap:nowrap;}
.ov-time{font-weight:700;font-size:12px;color:var(--tx2);flex-shrink:0;min-width:38px;white-space:nowrap;}
.ov-name{font-size:12px;color:var(--tx);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ov-memo{font-size:10px;color:#8b5cf6;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;text-decoration:underline dotted;}
.ov-empty{font-size:11px;color:var(--tx3);padding:4px 0;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:20px 16px 40px;}
.modal-drag{width:40px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 16px;}
.shift-view-row{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;border-radius:12px;margin-bottom:10px;border:2px solid;}
.header-badge{font-size:12px;padding:4px 12px;border-radius:20px;font-weight:700;}
.logout-btn{background:none;border:1px solid var(--bd);border-radius:8px;padding:8px 14px;font-size:13px;color:var(--tx2);cursor:pointer;}
.sync-badge{display:inline-flex;align-items:center;gap:4px;background:#dcfce7;color:#15803d;border:1px solid #86efac;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;}
.sync-dot{width:7px;height:7px;background:#16a34a;border-radius:50%;animation:pulse 1.5s infinite;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#22c55e;color:#fff;padding:12px 22px;border-radius:12px;font-size:14px;font-weight:700;z-index:500;transition:all .3s;opacity:0;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.login-wrap{min-height:100vh;background:linear-gradient(135deg,#fff7ed,#f5f3ff);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.login-card{background:#fff;border:1px solid var(--bd);border-radius:20px;padding:28px 20px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.08);}
.role-card-wrap{display:flex;gap:10px;margin-bottom:22px;}
.role-card{flex:1;border-radius:14px;padding:16px 8px;text-align:center;border:1px solid;}
.loading-screen{position:fixed;inset:0;background:linear-gradient(135deg,#fff7ed,#f5f3ff);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;}
.loading-spinner{width:52px;height:52px;border:4px solid #fed7aa;border-top-color:#f97316;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:18px;}
.empty{text-align:center;padding:36px;color:var(--tx3);font-size:15px;}
.info-box{background:#f8fafc;border:1px solid var(--bd);border-radius:10px;padding:14px;font-size:14px;color:var(--tx2);line-height:2.1;}
.week-label{font-size:14px;font-weight:700;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid;}
.del-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;}
.del-box{background:#fff;border-radius:16px;padding:24px 20px;width:100%;max-width:360px;}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table.wish-tbl{border-collapse:collapse;width:100%;}
table.wish-tbl th,table.wish-tbl td{border:1px solid var(--bd);padding:8px 6px;font-size:13px;text-align:center;vertical-align:top;}
table.wish-tbl th{background:#f8fafc;font-weight:600;color:var(--tx2);}
table.wish-tbl td.name-cell{text-align:left;font-weight:700;white-space:nowrap;background:#f8fafc;min-width:80px;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
</style>
</head>
<body>
<div id="loading-screen" class="loading-screen">
  <div class="loading-spinner"></div>
  <div style="font-size:17px;font-weight:700;color:#f97316;">🔥 焼肉はじめ・焼肉つづき</div>
  <div style="font-size:14px;color:#94a3b8;margin-top:6px;">接続中...</div>
  <div id="loading-msg" style="font-size:12px;color:#94a3b8;margin-top:8px;"></div>
</div>
<div id="app" style="display:none;"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const FC={apiKey:"AIzaSyBfIk7IU4BX619ngyKOoE51zJ893pJYVkc",authDomain:"yakiniku-shift.firebaseapp.com",databaseURL:"https://yakiniku-shift-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"yakiniku-shift",storageBucket:"yakiniku-shift.firebasestorage.app",messagingSenderId:"230372004048",appId:"1:230372004048:web:04228eabdd19e165200ed5"};

const TIME_LIST=[];
for(let h=9;h<=20;h++){TIME_LIST.push(`${String(h).padStart(2,"0")}:00`);if(h<20)TIME_LIST.push(`${String(h).padStart(2,"0")}:30`);}

const STORES=["焼肉はじめ","焼肉つづき"];
const DAYS=["月","火","水","木","金","土","日"];
const ROLES={president:"社長",manager:"社員",hall:"ホール",kitchen:"キッチン",part:"アルバイト"};
const MGMT=["president","manager"];
const ROLE_C={
  president:{bg:"#fdf2f8",text:"#9d174d",border:"#f9a8d4"},
  manager:  {bg:"#fef9c3",text:"#a16207",border:"#fde047"},
  hall:     {bg:"#dbeafe",text:"#1d4ed8",border:"#93c5fd"},
  kitchen:  {bg:"#ffedd5",text:"#c2410c",border:"#fdba74"},
  part:     {bg:"#dcfce7",text:"#15803d",border:"#86efac"},
};
const WISH_OPTS=[
  {val:"night",  label:"夜　〇",  sub:"夜出られる",  bg:"#fdf2f8",color:"#9d174d",border:"#f9a8d4"},
  {val:"lunch",  label:"昼　〇",  sub:"昼出られる",  bg:"#dbeafe",color:"#1d4ed8",border:"#93c5fd"},
  {val:"both_ok",label:"両方 〇", sub:"昼も夜も出られる",bg:"#dcfce7",color:"#15803d",border:"#86efac"},
  {val:"both_ng",label:"両方 ✕", sub:"出られない",   bg:"#fee2e2",color:"#dc2626",border:"#fca5a5"},
];
const DEFAULT_PW={manager:"yakinikuhajime",part:"123"};
const HOLIDAYS={"2024-01-01":"元日","2024-01-08":"成人の日","2024-02-11":"建国記念日","2024-02-12":"振替休日","2024-02-23":"天皇誕生日","2024-03-20":"春分の日","2024-04-29":"昭和の日","2024-05-03":"憲法記念日","2024-05-04":"みどりの日","2024-05-05":"こどもの日","2024-05-06":"振替休日","2024-07-15":"海の日","2024-08-11":"山の日","2024-08-12":"振替休日","2024-09-16":"敬老の日","2024-09-22":"秋分の日","2024-09-23":"振替休日","2024-10-14":"スポーツの日","2024-11-03":"文化の日","2024-11-04":"振替休日","2024-11-23":"勤労感謝の日","2025-01-01":"元日","2025-01-13":"成人の日","2025-02-11":"建国記念日","2025-02-23":"天皇誕生日","2025-02-24":"振替休日","2025-03-20":"春分の日","2025-04-29":"昭和の日","2025-05-03":"憲法記念日","2025-05-04":"みどりの日","2025-05-05":"こどもの日","2025-05-06":"振替休日","2025-07-21":"海の日","2025-08-11":"山の日","2025-09-15":"敬老の日","2025-09-23":"秋分の日","2025-10-13":"スポーツの日","2025-11-03":"文化の日","2025-11-23":"勤労感謝の日","2025-11-24":"振替休日","2026-01-01":"元日","2026-01-12":"成人の日","2026-02-11":"建国記念日","2026-02-23":"天皇誕生日","2026-03-20":"春分の日","2026-04-29":"昭和の日","2026-05-03":"憲法記念日","2026-05-04":"みどりの日","2026-05-05":"こどもの日","2026-07-20":"海の日","2026-08-11":"山の日","2026-09-21":"敬老の日","2026-09-22":"秋分の日","2026-10-12":"スポーツの日","2026-11-03":"文化の日","2026-11-23":"勤労感謝の日"};

let STATE={
  role:null,tab:"staff",
  staff:[],wishes:{},shifts:{},pws:{...DEFAULT_PW},submit:{},
  shiftWeek:getMon(),wishWeek:getMon(),ovWeek:getMon(),
  activeStore:0,selDate:null,pickStaff:null,pickTime:TIME_LIST[4],
  deleteCandidate:null,me:"",partWeek:getMon(),openDates:{},viewDate:null,partOffset:0,
  editShift:null,memoModal:null,deadline:localStorage.getItem('sk_deadline')||'',editStaffId:null,editStaffName:'',
};
let db;

async function init(){
  const lm=document.getElementById("loading-msg");
  const to=setTimeout(()=>{lm.textContent="接続に時間がかかっています...";},3000);
  try{
    const app=initializeApp(FC);db=getDatabase(app);
    await Promise.race([get(ref(db,"pws")),new Promise((_,r)=>setTimeout(()=>r(new Error("t")),8000))]);
    clearTimeout(to);
    const ps=await get(ref(db,"pws"));
    if(!ps.exists())await set(ref(db,"pws"),DEFAULT_PW);else STATE.pws=ps.val();
    startListeners();
    document.getElementById("loading-screen").style.display="none";
    document.getElementById("app").style.display="block";
    render();
  }catch(e){
    clearTimeout(to);
    document.getElementById("loading-screen").innerHTML=`<div style="text-align:center;padding:24px;max-width:340px;"><div style="font-size:32px;margin-bottom:12px;">⚠️</div><div style="font-size:16px;font-weight:700;color:#dc2626;margin-bottom:8px;">接続できませんでした</div><div style="font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.8;">Firebaseのルールを確認してください。</div><button onclick="location.reload()" style="background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;border:none;border-radius:10px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;">🔄 再読み込み</button></div>`;
  }
}

function startListeners(){
  onValue(ref(db,"staff"),   s=>{STATE.staff  =s.val()?Object.values(s.val()):[];render();});
  onValue(ref(db,"wishes"),  s=>{STATE.wishes =s.val()||{};render();});
  onValue(ref(db,"shifts"),  s=>{STATE.shifts =s.val()||{};render();});
  onValue(ref(db,"pws"),     s=>{if(s.val())STATE.pws=s.val();});
  onValue(ref(db,"submit"),  s=>{STATE.submit =s.val()||{};render();});
}

async function fbSet(p,v){await set(ref(db,p),v);}
async function fbUpd(p,v){await update(ref(db,p),v);}
async function fbDel(p){await remove(ref(db,p));}

function getMon(d=new Date()){
  const x=new Date(d);
  const localY=x.getFullYear(),localM=x.getMonth(),localD=x.getDate();
  const localDate=new Date(localY,localM,localD);
  const w=localDate.getDay();
  const diff=w===0?-6:1-w;
  localDate.setDate(localD+diff);
  const yy=localDate.getFullYear();
  const mm=String(localDate.getMonth()+1).padStart(2,"0");
  const dd=String(localDate.getDate()).padStart(2,"0");
  return `${yy}-${mm}-${dd}`;
}
function twoWeekDates(s){
  return Array.from({length:14},(_,i)=>{
    const[y,m,d]=s.split("-").map(Number);
    const dt=new Date(y,m-1,d+i);
    const yy=dt.getFullYear();
    const mm=String(dt.getMonth()+1).padStart(2,"0");
    const dd=String(dt.getDate()).padStart(2,"0");
    return `${yy}-${mm}-${dd}`;
  });
}
function sevenDates(s){
  return Array.from({length:7},(_,i)=>{
    const[y,m,d]=s.split("-").map(Number);
    const dt=new Date(y,m-1,d+i);
    const yy=dt.getFullYear();
    const mm=String(dt.getMonth()+1).padStart(2,"0");
    const dd=String(dt.getDate()).padStart(2,"0");
    return `${yy}-${mm}-${dd}`;
  });
}
function fmt(s){const d=new Date(s+"T00:00:00");return`${d.getMonth()+1}/${d.getDate()}`;}
function dayCol(s){
  if(HOLIDAYS[s])return"#dc2626";
  const[y,m,d]=s.split("-").map(Number);
  const w=new Date(y,m-1,d).getDay();
  return w===0?"#dc2626":w===6?"#2563eb":"#334155";
}
function thBg(s){
  if(HOLIDAYS[s])return"#fff1f2";
  const[y,m,d]=s.split("-").map(Number);
  const w=new Date(y,m-1,d).getDay();
  return w===0?"#fff1f2":w===6?"#eff6ff":"#f8fafc";
}
function getW(date,sid){return(STATE.wishes[date]&&STATE.wishes[date][sid])||{};}
function getShifts(si,date){return((STATE.shifts[`store${si}`]||{})[date])||[];}
function available(date){return STATE.staff.filter(s=>{const w=getW(date,s.id).type||"";return w==="both_ok"||w==="lunch"||w==="night";});}
function recentWeeks(n){const w=[];const d=new Date();d.setDate(d.getDate()-((d.getDay()||7)-1));for(let i=0;i<n;i++){const x=new Date(d);x.setDate(x.getDate()-i*7);w.push(x.toISOString().split("T")[0]);}return w;}
function hasSubmitted(sid,ws){return twoWeekDates(ws).some(date=>{const w=(STATE.wishes[date]&&STATE.wishes[date][sid]);return w&&w.type;});}
function unsubCountFor(s){return recentWeeks(8).filter(w=>!hasSubmitted(s.id,w)).length;}
function getUnsub(){return STATE.staff.filter(s=>!MGMT.includes(s.role)&&!hasSubmitted(s.id,getMon()));}
function mgrBadge(role){if(!MGMT.includes(role))return"";const rc=ROLE_C[role];return`<span class="mgr-badge" style="background:${rc.text};">社</span>`;}
function wishOptLabel(val){const o=WISH_OPTS.find(x=>x.val===val);return o?o.label:"−";}
function wishOptStyle(val){return WISH_OPTS.find(x=>x.val===val)||{bg:"#f1f5f9",color:"#94a3b8",border:"#e2e8f0"};}

function checkAutoDel(){
  const weeks=recentWeeks(8);
  const toDelete=STATE.staff.filter(s=>{
    if(MGMT.includes(s.role))return false;
    const submitted=Object.keys(STATE.submit[s.id]||{});
    const fms=new Date(getMon(new Date(s.id))+"T00:00:00").getTime();
    return fms<=new Date(weeks[weeks.length-1]+"T00:00:00").getTime()&&!weeks.some(w=>submitted.includes(w));
  });
  if(toDelete.length>0)setState({deleteCandidate:toDelete});
}

async function autoFill(si){
  const dates=twoWeekDates(STATE.shiftWeek);const updates={};
  dates.forEach(date=>{
    const already=new Set(getShifts(si,date).map(sh=>sh.staffId));
    const storeName=si===0?"hajime":"tsuzuki";
    const avail=available(date).filter(s=>{
      if(already.has(s.id))return false;
      const wObj=getW(date,s.id);
      if(!wObj.store||wObj.store==="both")return true;
      return wObj.store===storeName;
    });
    const existing=[...getShifts(si,date)];
    for(const s of avail){
      const wObj=getW(date,s.id);
      let t="11:00";
      if(wObj.type==="both_ok") t=wObj.lunchFrom||wObj.dinnerFrom||"11:00";
      else t=wObj.timeFrom||"11:00";
      existing.push({staffId:s.id,time:t});
    }
    if(existing.length>0)updates[date]=existing;
  });
  await fbUpd(`shifts/store${si}`,updates);
  showToast(`${STORES[si]} 自動割り当て完了 ⚡`);
}

        }).join("");
        return`<td class="ov-store-cell" style="border:1px solid var(--bd);background:#fff;">${entries}</td>`;
      }).join("");
      return`<tr>
        <td class="ov-day-cell" style="border:1px solid var(--bd);background:${bg};min-width:52px;">
          <div class="ov-day-name" style="color:${col};">${DAYS[i]}</div>

          ${holiday?`<div style="font-size:9px;color:#dc2626;">🎌</div>`:""}
        </td>
        ${storeCells}
      </tr>`;
    }).join("");
    return`<table class="ov-table">
      <thead><tr>
        <th style="min-width:52px;background:#f8fafc;">日付</th>
        <th style="background:#fff7ed;color:#f97316;min-width:120px;">🔥 焼肉はじめ</th>
        <th style="background:#f5f3ff;color:#8b5cf6;min-width:120px;">🔥 焼肉つづき</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  return`
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;">
      <div style="flex:1;min-width:160px;"><input type="date" value="${weekStart}" class="inp" onchange="STATE.shiftWeek=getMon(new Date(this.value+'T12:00:00'));render();"></div>
      <button class="btn btn-light btn-sm" onclick="STATE.shiftWeek=getMon();render();">今週〜</button>
    </div>
    <div class="shift-week-block" style="overflow:hidden;">
      <div class="ov-week-label" style="color:#f97316;border-color:#fed7aa;">第1週　${fd(week1[0])} 〜 ${fd(week1[6])}</div>

      <div style="overflow-x:auto;">${buildGrid(week2)}</div>
    </div>`;
}

function renderShiftTab(){

                              ${wObj.type==="both_ok"?(wObj.lunchFrom||wObj.dinnerFrom?`<span style="font-size:14px;font-weight:700;color:#475569;">昼${wObj.lunchFrom||"未定"} 夜${wObj.dinnerFrom||"未定"}</span>`:""):(wObj.timeFrom?`<span style="font-size:14px;font-weight:700;color:#475569;">${wObj.timeFrom}〜</span>`:"")}

                            <button class="btn btn-light" onclick="STATE.pickStaff=null;render();">キャンセル</button>

function renderShiftViewModal(){
  const date=STATE.viewDate;
  const[_sv,_sm,_sd]=date.split("-").map(Number);const dateObj=new Date(_sv,_sm-1,_sd);
  const wd=dateObj.getDay();const dayIdx=wd===0?6:wd-1;
  const holiday=HOLIDAYS[date];
  const sDates=twoWeekDates(STATE.shiftWeek);
  const idx=sDates.indexOf(date);
  const prevDate=idx>0?sDates[idx-1]:null;
  const nextDate=idx<sDates.length-1?sDates[idx+1]:null;
  return`<div class="modal-overlay" onclick="if(event.target===this)closeShiftView()">
    <div class="modal-sheet">
      <div class="modal-drag"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
        <button onclick="closeShiftView()" style="background:none;border:none;font-size:26px;cursor:pointer;padding:4px;color:#64748b;">✕</button>
        <div style="font-size:16px;font-weight:700;">シフト確認</div>
        <div style="width:36px;"></div>
      </div>
      <div style="background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;border-radius:16px;padding:18px 22px;margin-bottom:22px;text-align:center;">
        <div style="font-size:24px;font-weight:900;">${dateObj.getMonth()+1}月${dateObj.getDate()}日（${DAYS[dayIdx]}）</div>
        ${holiday?`<div style="font-size:14px;opacity:.85;margin-top:5px;">🎌 ${holiday}</div>`:""}
      </div>
      <div style="display:flex;gap:10px;margin-bottom:22px;">
        ${prevDate?`<button onclick="showShiftView('${prevDate}')" class="btn btn-light btn-sm" style="flex:1;">← ${fmt(prevDate)}</button>`:`<div style="flex:1;"></div>`}
        ${nextDate?`<button onclick="showShiftView('${nextDate}')" class="btn btn-light btn-sm" style="flex:1;">${fmt(nextDate)} →</button>`:`<div style="flex:1;"></div>`}
      </div>
      ${STORES.map((storeName,si)=>{
        const ds=getShifts(si,date);
        const sorted=[...ds].sort((a,b)=>a.time.localeCompare(b.time));
        return`<div style="margin-bottom:22px;">
          <div style="font-size:17px;font-weight:700;padding:12px 14px;border-radius:12px;margin-bottom:12px;background:${si===0?"#fff7ed":"#f5f3ff"};color:${si===0?"#f97316":"#8b5cf6"};">🔥 ${storeName}　${ds.length}人</div>
          ${ds.length===0?`<div style="color:#94a3b8;font-size:15px;padding:8px 0;">（未設定）</div>`:
            sorted.map(sh=>{const s=STATE.staff.find(x=>x.id===sh.staffId);if(!s)return"";const rc=ROLE_C[s.role]||ROLE_C.part;const wObj=getW(date,s.id);
              return`<div class="shift-view-row" style="background:${rc.bg};border-color:${rc.border};">
                <div style="font-size:20px;font-weight:900;color:${rc.text};min-width:64px;flex-shrink:0;">${sh.time}</div>
                <div style="flex:1;"><div style="font-size:18px;font-weight:700;color:${rc.text};">${mgrBadge(s.role)} ${s.name}</div>
                <div style="font-size:13px;color:${rc.text};opacity:.7;margin-top:3px;">${ROLES[s.role]}</div>
                ${wObj.memo?`<div style="font-size:14px;color:${rc.text};opacity:.75;margin-top:5px;line-height:1.6;">💬 ${wObj.memo}</div>`:""}
              </div></div>`;
            }).join("")}
        </div>`;
      }).join("")}
    </div>
  </div>`;
}

function renderSettingsTab(){
  return`<div class="card">
    <div class="card-title">⚙️ パスワード設定</div>
    <p style="font-size:14px;color:#64748b;margin-bottom:18px;">空欄のまま保存すると現在のパスワードを維持します</p>
    <div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:14px;padding:18px;margin-bottom:14px;">
      <div style="font-size:15px;font-weight:700;margin-bottom:6px;">👔 社員・店長パスワード</div>
      <div style="font-size:12px;color:#94a3b8;margin-bottom:12px;">現在: ${"●".repeat(Math.min(STATE.pws.manager.length,12))}</div>
      <div class="field" style="margin:0;"><label>新しいパスワード</label><input type="password" id="new-mgr-pw" class="inp" placeholder="新しいパスワード"></div>
    </div>
    <div style="background:#f5f3ff;border:1px solid #ddd6fe;border-radius:14px;padding:18px;margin-bottom:18px;">
      <div style="font-size:15px;font-weight:700;margin-bottom:6px;">🧑‍🍳 アルバイトパスワード</div>
      <div style="font-size:12px;color:#94a3b8;margin-bottom:12px;">現在: ${"●".repeat(Math.min(STATE.pws.part.length,12))}</div>
      <div class="field" style="margin:0;"><label>新しいパスワード</label><input type="password" id="new-part-pw" class="inp" placeholder="新しいパスワード"></div>
    </div>
    <button class="btn btn-primary" style="width:100%;" onclick="savePw()">🔒 パスワードを更新</button>
  </div>
  <div class="card">

    <div class="field">
      <label>提出期限（例：4月10日（木）まで）</label>
      <input id="deadline-inp" class="inp" placeholder="例：4月10日（木）23:59まで" value="${STATE.deadline}">
    </div>
    <button class="btn btn-primary" style="width:100%;" onclick="saveDeadline()">📅 提出期限を設定</button>
  </div>`;
}

function renderEditStaffModal(){
  return`<div class="modal-overlay" onclick="if(event.target===this){STATE.editStaffId=null;render();}">
    <div class="modal-sheet" style="max-height:50vh;">
      <div class="modal-drag"></div>
      <div style="font-size:16px;font-weight:700;color:#f97316;margin-bottom:16px;">✏️ スタッフ名を変更</div>
      <div class="field">
        <label>新しい名前</label>
        <input class="inp" id="edit-staff-inp" value="${STATE.editStaffName}" placeholder="名前を入力" oninput="STATE.editStaffName=this.value;" style="font-size:18px;padding:14px;">
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" style="flex:1;" onclick="saveStaffName()">変更を保存 ✓</button>
        <button class="btn btn-light" onclick="STATE.editStaffId=null;render();">キャンセル</button>
      </div>
    </div>
  </div>`;
}
function renderMemoModal(){
  const memo=STATE.memoModal||"";
  return`<div class="modal-overlay" onclick="STATE.memoModal=null;render();">
    <div class="modal-sheet" style="max-height:60vh;">
      <div class="modal-drag"></div>
      <div style="font-size:14px;font-weight:700;color:#8b5cf6;margin-bottom:14px;">💬 備考・メモ</div>
      <div style="font-size:16px;line-height:1.9;color:#1e293b;white-space:pre-wrap;word-break:break-all;">${memo}</div>
      <button class="btn btn-light" style="width:100%;margin-top:20px;" onclick="STATE.memoModal=null;render();">閉じる</button>

}
function renderDeleteModal(){
  return`<div class="del-modal"><div class="del-box">
    <div style="font-size:17px;font-weight:700;color:#dc2626;margin-bottom:12px;">⚠️ 自動削除の確認</div>
    <p style="font-size:14px;color:#374151;margin-bottom:16px;line-height:1.8;">以下のスタッフが2ヶ月以上希望を提出していません。削除しますか？</p>
    <div style="background:#fee2e2;border-radius:10px;padding:14px;margin-bottom:18px;">${STATE.deleteCandidate.map(s=>`<div style="font-size:14px;font-weight:700;color:#dc2626;padding:4px 0;">・${s.name}</div>`).join("")}</div>
    <div class="btn-row">
      <button class="btn btn-danger" onclick="confirmDelete()">削除する</button>
      <button class="btn btn-light" onclick="STATE.deleteCandidate=null;render();">今は削除しない</button>
    </div>
  </div></div>`;
}
